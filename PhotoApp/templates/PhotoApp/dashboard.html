{% extends "layout.html" %}
{% load static %}

{% block content %}
<div class="relative w-full flex-grow flex items-center justify-center overflow-hidden min-h-[calc(100vh-4rem)] -mt-16 pt-16">
    <!-- Nature Background -->
    <div class="absolute inset-0 z-0">
        <img src="{% static 'images/new_dashboard_bg.png' %}" alt="Sunny Meadow" class="w-full h-full object-cover object-center filter blur-sm opacity-90 transform scale-105 transition-transform duration-[20s] hover:scale-100">
        <div class="absolute inset-0 bg-stone-900/10 mix-blend-multiply"></div>
        <div class="absolute inset-0 bg-[#fdfcfaf]/30 backdrop-blur-[2px]"></div>
    </div>

    <!-- Main Content -->
    <div class="relative z-10 w-full max-w-2xl mx-auto p-4 text-center">
        <!-- Glassmorphism Card -->
        <div class="bg-white/70 backdrop-blur-xl border border-white/50 p-10 sm:p-14 rounded-3xl shadow-xl flex flex-col items-center">
            
            <!-- Welcome Icon -->
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-6 shadow-sm border border-emerald-200">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>

            <h1 class="text-5xl font-serif font-bold text-emerald-900 mb-4 tracking-tight">Welcome, {{ user.username }}</h1>
            <p class="text-stone-600 text-lg mb-10 max-w-md">Your personal nature space. What would you like to do today?</p>

            <div class="flex flex-col sm:flex-row gap-5 w-full justify-center">
                <a href="{% url 'all_photos' %}" class="flex-1 px-8 py-4 bg-emerald-700 hover:bg-emerald-800 text-white font-bold rounded-2xl shadow-md transform transition hover:-translate-y-1 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    View Gallery
                </a>

                <a href="{% url 'add_photo' %}" class="flex-1 px-8 py-4 bg-white hover:bg-stone-50 border-2 border-emerald-600 text-emerald-700 font-bold rounded-2xl shadow-sm transform transition hover:-translate-y-1 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add New Photo
                </a>
            </div>
            
            <a href="{% url 'profile' %}" class="mt-8 text-stone-500 hover:text-emerald-700 font-medium transition flex items-center gap-1">
                Go to my Profile 
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>
        </div>
    </div>
</div>
{% endblock %}
