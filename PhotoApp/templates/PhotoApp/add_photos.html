{% extends "layout.html" %}


{% block title %}
    all Photo Page
{% endblock %}


{% block content %}
    <form method="post" enctype="multipart/form-data" action="{% url 'add_photo' %}" class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
        {% csrf_token %}
        {{ photo_form.as_p }}
        {{ category_form.as_p }}
        
        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg">Add Photo</button>
    </form>
{% endblock %}
