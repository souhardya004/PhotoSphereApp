{% extends "layout.html" %}
{% load static %}

{% block title %}
    Register | PhotoSphere
{% endblock %}

{% block content %}
    <div class="min-h-[calc(100vh-64px)] flex items-center justify-center relative overflow-hidden -mt-16 pt-16">
        
        <!-- Nature Background with Soft Overlay -->
        <div class="absolute inset-0 z-0">
            <img src="{% static 'images/register_bg.png' %}" alt="Lush Forest Background" class="w-full h-full object-cover object-center filter blur-sm opacity-90 transform scale-105 transition-transform duration-[20s] hover:scale-100">
            <div class="absolute inset-0 bg-emerald-900/20 mix-blend-multiply"></div>
            <div class="absolute inset-0 bg-[#fdfcfaf]/50 backdrop-blur-[2px]"></div>
        </div>

        <div class="relative z-10 w-full max-w-md m-4">
            <!-- Light Glass Card -->
            <div class="bg-white/70 backdrop-blur-xl border border-white/50 p-8 sm:p-10 rounded-3xl shadow-xl">
                
                <div class="text-center mb-8">
                    <h2 class="text-4xl font-serif font-bold text-emerald-900 mb-2 tracking-tight">Create Account</h2>
                    <p class="text-stone-500 text-sm">Join PhotoSphere and share your moments.</p>
                </div>

                <form method="POST" class="auth-form space-y-5">
                    {% csrf_token %}
                    {{ form.as_p }}
                    
                    <button type="submit" class="w-full mt-8 bg-emerald-700 hover:bg-emerald-800 text-white font-bold text-lg py-3 px-4 rounded-xl shadow-md transform transition hover:-translate-y-1">
                        Register Now
                    </button>
                </form>
                
                <p class="mt-6 text-center text-stone-600 text-sm">
                    Already have an account? <a href="{% url 'login' %}" class="text-emerald-700 font-bold hover:text-emerald-900 hover:underline transition">Log in</a>
                </p>
            </div>
        </div>
    </div>

    <style>
        /* Form Styling for Django generated inputs */
        .auth-form p {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1.2rem;
        }
        .auth-form label {
            color: #1c1917; /* stone-900 */
            font-weight: 600;
            font-size: 0.95rem;
            margin-left: 0.25rem;
        }
        .auth-form input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(168, 162, 158, 0.4);
            border-radius: 0.75rem;
            color: #292524;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .auth-form input::placeholder {
            color: #a8a29e;
        }
        .auth-form input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #047857; /* emerald-700 */
            box-shadow: 0 0 0 4px rgba(4, 120, 87, 0.1);
        }
        .auth-form .helptext {
            font-size: 0.75rem;
            color: #78716c;
            margin-top: -0.2rem;
            margin-left: 0.25rem;
        }
        .auth-form ul.errorlist {
            color: #991b1b;
            font-size: 0.85rem;
            background: rgba(254, 226, 226, 0.5);
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(248, 113, 113, 0.5);
        }
    </style>
{% endblock %}
