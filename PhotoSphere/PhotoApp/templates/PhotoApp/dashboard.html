{% extends "layout.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center h-screen gap-6">

    <h1 class="text-3xl font-bold">Welcome, {{ user.username }}</h1>

    <div class="flex gap-6">
        <a href="{% url 'all_photos' %}"
           class="px-6 py-3 bg-blue-500 text-white rounded-lg shadow">
            See All Photos
        </a>

        <a href="{% url 'add_photo' %}"
           class="px-6 py-3 bg-green-500 text-white rounded-lg shadow">
            Add Photo
        </a>
    </div>

</div>
{% endblock %}
